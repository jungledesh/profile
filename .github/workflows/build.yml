name: Security & Correctness + Build Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # ── Dependency Scans: continue on low/medium, fail only on high/critical ──

      - name: cargo audit (RustSec) - warn on findings, continue
        uses: actions-rust-lang/audit@v1
        continue-on-error: true  # Low/medium won't block; use audit.toml for ignores
        # with:
        #   token: ${{ secrets.GITHUB_TOKEN }}  # Uncomment if you want auto GitHub Issues

      - name: OSV-Scanner - fail only on HIGH/CRITICAL (CVSS >=7.0)
        continue-on-error: true  # Lets us check manually without step failing early
        run: |
          # Install latest osv-scanner binary (reliable, no deps)
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

          # Install jq (ubuntu-latest usually has it, but ensure)
          sudo apt-get update -qq && sudo apt-get install -y jq

          # Scan → JSON
          osv-scanner --lockfile Cargo.lock --format json > osv-results.json || true

          # Count HIGH (>=7.0) or CRITICAL (>=9.0) vulns
          HIGH_CRIT_COUNT=$(jq '[.results[]?.vulnerabilities[]?.severity[]? 
            | select(.type == "CVSS_V3" and (.score | tonumber >= 7.0))] | length' osv-results.json)

          if [ "$HIGH_CRIT_COUNT" -gt 0 ]; then
            echo "ERROR: Found $HIGH_CRIT_COUNT HIGH or CRITICAL vulnerabilities!"
            jq . osv-results.json  # Pretty-print for logs
            exit 1
          else
            echo "No HIGH/CRITICAL vulnerabilities found (low/medium OK)."
            jq . osv-results.json || echo "No results."
          fi

      # ── Code Quality & SAST ──

      - name: Clippy - correctness & safety (fail on warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Semgrep SAST Scan - via Docker (publishes automatically with token)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          # Pull official image (already done in your log, but explicit for safety)
          docker pull returntocorp/semgrep:latest

          # Run semgrep ci
          # - No --publish needed → automatic upload + PR comments when token set
          # - --config=auto: pulls good defaults (Rust + security rules)
          # - Add --error later to fail CI on findings (after you review/tune)
          # - --suppress-errors: default behavior (CI passes on internal errors, fails only on blocking findings if configured in dashboard)
          docker run \
            --rm \
            -v "${{ github.workspace }}:/src" \
            -e SEMGREP_APP_TOKEN \
            -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF="${{ github.ref }}" \
            returntocorp/semgrep:latest \
            semgrep ci --config=auto

      # ── Build & Push (only proceeds if above didn't hard-fail) ──

      - name: Build binary
        run: cargo build --release

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/jungledesh/inference:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max