name: Build & Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.tags.outputs.taglist }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo audit
        uses: actions-rust-lang/audit@v1

      - name: OSV-Scanner (fail on HIGH/CRITICAL)
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          sudo apt-get update -qq && sudo apt-get install -y jq
          osv-scanner --lockfile Cargo.lock --format json > osv-results.json || true
          HIGH_CRIT_COUNT=$(jq '[.results[]?.vulnerabilities[]?.severity[]? | select(.type == "CVSS_V3" and (.score | tonumber >= 7.0))] | length' osv-results.json)
          if [ "$HIGH_CRIT_COUNT" -gt 0 ]; then
            echo "ERROR: Found $HIGH_CRIT_COUNT HIGH or CRITICAL vulnerabilities!"
            jq . osv-results.json
            exit 1
          fi
          echo "No HIGH/CRITICAL vulnerabilities found."

      - name: Semgrep SAST
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          docker pull returntocorp/semgrep:latest
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -e SEMGREP_APP_TOKEN \
            -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF="${{ github.ref }}" \
            returntocorp/semgrep:latest \
            semgrep ci

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Set image tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "taglist=ghcr.io/jungledesh/inference:latest,ghcr.io/jungledesh/inference:${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "taglist=ghcr.io/jungledesh/inference:pr-${{ github.event.pull_request.number }},ghcr.io/jungledesh/inference:pr-${{ github.event.pull_request.number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.taglist }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log image
        run: echo "Pushed image(s): ${{ steps.tags.outputs.taglist }}"
