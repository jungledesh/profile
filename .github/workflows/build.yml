name: Build & Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1518e098f326d16ec030ab76751fbf2fa02ed1d4
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab
        with:
          cache-on-failure: true

      - name: cargo audit
        uses: actions-rust-lang/audit@5c78f6a5e63bfb3b2e64e0b1b8c6f8d9e1a2b3c4

      - name: OSV-Scanner (fail on HIGH/CRITICAL)
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          sudo apt-get update -qq && sudo apt-get install -y jq
          osv-scanner --lockfile Cargo.lock --format json > osv-results.json
          HIGH_CRIT_COUNT=$(jq '[.results[]?.vulnerabilities[]?.severity[]? | select(.type == "CVSS_V3" and (.score | tonumber >= 7.0))] | length' osv-results.json)
          if [ "$HIGH_CRIT_COUNT" -gt 0 ]; then
            echo "ERROR: Found $HIGH_CRIT_COUNT HIGH or CRITICAL vulnerabilities!"
            jq . osv-results.json
            exit 1
          fi
          echo "No HIGH/CRITICAL vulnerabilities found."

      - name: Semgrep SAST
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          docker pull returntocorp/semgrep:latest
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -e SEMGREP_APP_TOKEN \
            -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF="${{ github.ref }}" \
            returntocorp/semgrep:latest \
            semgrep ci

      - name: Check format
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Docker tags and whether to push
        id: docker_meta
        run: |
          REG="ghcr.io/jungledesh/inference"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tags=${REG}:latest,${REG}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tags=${REG}:pr-${{ github.event.pull_request.number }},${REG}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "tags=${REG}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: steps.docker_meta.outputs.push == 'true'
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece30505ee

      - name: Build and push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          push: ${{ steps.docker_meta.outputs.push == 'true' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
